name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        # Version comes from package.json#packageManager (pnpm@10.29.3) — the
        # single source of truth. action-setup@v4 errors if a `version:` is also
        # set here (ERR_PNPM_BAD_PM_VERSION), so do not re-specify it.
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@mission-control.dev"
          git config --global user.name "CI"

      - name: Verify immutable workflow action pins
        run: python3 scripts/check-workflow-action-pins.py

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: API contract parity
        run: pnpm api:parity

      - name: Security audit command tests
        run: pnpm test:security-shell

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Prepare E2E environment
        run: cp .env.test .env

      - name: Build
        run: pnpm build

      - name: Verify standalone artifact boundaries
        run: pnpm artifact:check

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: E2E tests
        run: pnpm test:e2e
